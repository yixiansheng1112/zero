name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout源码
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # path: '.' = 上传仓库全部静态文件（index.html在根目录）
      - name: 上传静态资源
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署Pages
        id: deployment
        uses: actions/deploy-pages@v5
