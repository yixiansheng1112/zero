<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫咪效果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      box-sizing: border-box;
    }

    .box {
      position: relative;
      width: 1000px;
      margin: 100px auto;
      /* 滚动效果 */
      overflow: hidden;



    }

    .box ul li img {
      width: 200px;

    }

    .box ul {
      display: flex;
      gap: 15px;
      scroll-behavior: smooth;
      /* 添加滚动条 */
      overflow-x: auto;
      overflow: hidden;

    }

    .box::before {
      content: '';
      position: absolute;
      top: -50px;
      left: 0;
      background-color: rgb(255, 255, 255);
      width: 100%;
      height: 100%;
      width: 100%;
      height: 100px;
      border-radius: 50%;
    }

    .box::after {
      content: '';
      position: absolute;

      left: 0;
      bottom: -50px;
      background-color: rgb(255, 255, 255);
      width: 100%;
      height: 100%;
      width: 100%;
      height: 100px;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <div class="box">
    <ul>
      <li><a href="#"><img src="../img/cat1.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat2.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat3.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat4.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat5.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat6.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat7.jpg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat8.jpeg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat9.jpeg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat10.jpeg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat11.jpeg" alt=""></a></li>
      <li><a href="#"><img src="../img/cat12.jpeg" alt=""></a></li>
    </ul>
  </div>

  <script>
    // 获取可滚动的容器
    const scrollContainer = document.querySelector('.box ul');
    // 监听鼠标滚轮事件
    scrollContainer.addEventListener('wheel', (e) => {
      // 阻止默认的垂直滚动行为

      e.preventDefault();
      // 根据滚轮的垂直滚动量（deltaY）调整横向滚动量（scrollLeft）
      // 乘以系数（如 1.5）可调整滚动灵敏度
      scrollContainer.scrollLeft += e.deltaY * 1.5;
    });
  </script>
</body>

</html>
